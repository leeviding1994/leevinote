server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: leevinote-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/leevinote
    username: leevinote
    password: leevinote123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL

app:
  upload:
    dir: ${user.home}/leevinote/uploads

jwt:
  secret: leevinote-secret-key-2024-very-long-secret-key-for-jwt-token-which-must-be-at-least-64-bytes-long
  expiration: 86400

logging:
  level:
    com.leevinote: DEBUG
    org.springframework.security: INFO
