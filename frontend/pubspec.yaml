name: leevinote
description: Leevinote - Notes, Alarms, Music, Video, Schedule Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # JWT & Storage
  flutter_secure_storage: ^9.0.0

  # UI Components
  flutter_markdown: ^0.6.14
  table_calendar: ^3.0.9

  # Media Players
  just_audio: ^0.9.36
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Notifications & Alarms
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.1
  file_picker: ^8.0.0

  # Navigation
  go_router: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
