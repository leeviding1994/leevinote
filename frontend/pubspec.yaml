name: leevinote
description: Leevinote - Notes, Alarms, Music, Video, Schedule Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # JWT & Storage
  flutter_secure_storage: ^9.0.0

  # UI Components
  flutter_markdown: ^0.6.14
  flutter_quill: 11.0.0
  dart_quill_delta: 10.8.3
  table_calendar: ^3.0.9

  # Media Players
  just_audio: ^0.9.36
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Notifications & Alarms
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  path_provider: ^2.1.1
  file_picker: ^8.0.0

  # Navigation
  go_router: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/images/icon.png"

dependency_overrides:
  flutter_local_notifications_windows:
    path: ../flutter_local_notifications_windows

flutter:
  uses-material-design: true
  assets:
    - assets/images/
